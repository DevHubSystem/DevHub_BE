server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api/v1}

spring:
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/devhub_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone : ${POSTGRES_TIMEZONE:-Asia/Ho_Chi_Minh}
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:300}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

app:
  cookie:
    secure: true

